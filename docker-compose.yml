# =============================================================================
# docker-compose.yml — Stack COMPLETO de OpenCapacity (entorno de DESARROLLO)
#
# Levanta todos los servicios:
#   frontend  Next.js con hot-reload (Vite -> Next 15 App Router)
#   api       FastAPI con hot-reload (uvicorn --reload)
#   worker    Celery worker con OpenDSS (concurrency=1)
#   redis     Broker de Celery + cache de circuitos
#   postgres  Persistencia de resultados
#   flower    Dashboard de monitoreo de Celery (solo dev)
#
# Uso:
#   docker compose up -d                       Levantar todos los servicios
#   docker compose up --scale worker=3         Escalar a 3 workers
#   docker compose logs -f frontend api        Ver logs combinados
#   docker compose exec api bash               Shell en el container de la API
#   docker compose down                        Bajar el stack
#   docker compose down -v                     Bajar + borrar volumenes
#
# URLs:
#   Frontend       http://localhost:3000
#   API + docs     http://localhost:8000/api/v1/docs
#   Flower         http://localhost:5555
#   Postgres       localhost:5432
#   Redis          localhost:6379
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Frontend — Next.js 15 (App Router) en modo desarrollo con hot-reload
  # El bind-mount del codigo permite ver los cambios sin reconstruir;
  # node_modules y .next quedan en volumenes anonimos para no chocar con el host
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./Frontend/hostcap
      target: dev
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8000/api/v1
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./Frontend/hostcap:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # API — FastAPI con hot-reload
  # ---------------------------------------------------------------------------
  api:
    build:
      context: ./Backend
      dockerfile: docker/Dockerfile.api
    ports:
      - "8000:8000"
    env_file:
      - ./Backend/.env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/hosting_capacity
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - 'ALLOWED_ORIGINS=["http://localhost:3000","http://localhost:3001","http://localhost:5173"]'
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ./Backend/app:/app/app
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Worker — Celery con OpenDSS
  # CRITICO: concurrency=1 (OpenDSS no es thread-safe).
  # Para mas paralelismo: docker compose up --scale worker=N
  # ---------------------------------------------------------------------------
  worker:
    build:
      context: ./Backend
      dockerfile: docker/Dockerfile.worker
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/hosting_capacity
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./Backend/app:/app/app
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Redis — Broker de Celery + cache de circuitos (TTL 2h)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # PostgreSQL — Persistencia de resultados
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: hosting_capacity
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Flower — Dashboard de monitoreo de Celery (solo desarrollo)
  # ---------------------------------------------------------------------------
  flower:
    image: mher/flower:2.0
    command: celery flower --broker=redis://redis:6379/1 --port=5555
    ports:
      - "5555:5555"
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  postgres_data:
