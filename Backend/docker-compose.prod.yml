# =============================================================================
# docker-compose.prod.yml — Entorno de PRODUCCION
#
# Diferencias con el entorno de desarrollo:
#   - Nginx como proxy inverso con SSL
#   - 2 replicas de la API
#   - 3 workers de Celery (3 calculos de HC en paralelo)
#   - Sin hot-reload ni volumenes de codigo
#   - Todas las credenciales via variables de entorno del host
#   - Redis con limite de 2GB
#   - Sin Flower (usar herramienta de monitoreo de produccion)
#
# Uso:
#   docker-compose -f docker-compose.prod.yml up -d
#   docker-compose -f docker-compose.prod.yml up --scale worker=5 -d
# =============================================================================

version: "3.9"

services:

  # ---------------------------------------------------------------------------
  # Nginx — Proxy inverso, SSL, balanceador de carga
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.24-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - frontend_static:/var/www/html:ro
    depends_on:
      - api
    restart: always

  # ---------------------------------------------------------------------------
  # API — FastAPI, 2 replicas, sin hot-reload
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    environment:
      - REDIS_URL=${REDIS_URL}
      - DATABASE_URL=${DATABASE_URL}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND}
      - SECRET_KEY=${SECRET_KEY}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - DEBUG=false
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
        max_attempts: 3
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Worker — Celery con OpenDSS, 3 replicas
  # Cada replica procesa un calculo de Hosting Capacity en paralelo
  # ---------------------------------------------------------------------------
  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    environment:
      - REDIS_URL=${REDIS_URL}
      - DATABASE_URL=${DATABASE_URL}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND}
    deploy:
      replicas: 3
      restart_policy:
        condition: on-failure
    depends_on:
      redis:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Redis — 2GB limite, persistencia en disco
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --maxmemory 2gb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: always

  # ---------------------------------------------------------------------------
  # PostgreSQL
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: always

volumes:
  redis_data:
  postgres_data:
  frontend_static:
