# =============================================================================
# Nginx — Proxy inverso para la Hosting Capacity API
#
# Funciones:
#   - Terminar SSL/TLS
#   - Redirigir HTTP -> HTTPS
#   - Hacer proxy hacia los containers de FastAPI
#   - Servir archivos estaticos del frontend (si aplica)
#   - Configurar timeouts generosos para uploads y tareas largas
# =============================================================================

upstream api_backend {
    # Con 2 replicas de la API en docker-compose.prod.yml, Nginx balancea entre ellas
    server api:8000;
    keepalive 32;
}

# --- Redireccion HTTP -> HTTPS ---
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# --- Servidor HTTPS principal ---
server {
    listen 443 ssl http2;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # --- Seguridad ---
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";

    # Limite de tamano para upload de archivos DSS grandes
    client_max_body_size 50M;

    # --- Frontend estatico (si existe) ---
    location / {
        root /var/www/html;
        try_files $uri $uri/ /index.html;
    }

    # --- API Backend ---
    location /api/ {
        proxy_pass         http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # Timeout generoso para uploads de circuitos grandes (hasta 1.5s por doc)
        proxy_read_timeout    120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    120s;
    }

    # --- WebSocket (actualizaciones de progreso futuras) ---
    location /ws/ {
        proxy_pass         http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        # 1 hora para tareas de hosting capacity largas
        proxy_read_timeout 3600s;
    }
}
